<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MacroMate animated logo">
  <defs>
    <linearGradient id="aGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="aBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0ABFC"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#aGrad)"/>

  <!-- M traced in: stroke draws first, then fills white -->
  <path id="mPath"
        d="M96 388 V146 a20 20 0 0 1 35 -13 l112 142 a16 16 0 0 0 26 0 l112 -142 a20 20 0 0 1 35 13 V388 a20 20 0 0 1 -40 0 V214 l-92 117 a32 32 0 0 1 -52 0 l-92 -117 V388 a20 20 0 0 1 -40 0 Z"
        fill="#FFFFFF" fill-opacity="0"
        stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round"
        stroke-dasharray="1800" stroke-dashoffset="1800">
    <animate attributeName="stroke-dashoffset" from="1800" to="0" dur="1.4s" begin="0s" fill="freeze"/>
    <animate attributeName="fill-opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
  </path>

  <!-- Play badge: pops in, then gentle pulse loop -->
  <g transform-origin="396 396">
    <circle cx="396" cy="396" r="74" fill="url(#aBadge)" stroke="#0F0A1E" stroke-width="10" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" additive="sum"
                        values="0.6;1.15;1" keyTimes="0;0.6;1" dur="0.6s" begin="1.5s" fill="freeze"/>
    </circle>
    <path d="M380 366 L424 392 a6 6 0 0 1 0 10 L380 428 a6 6 0 0 1 -10 -5 V371 a6 6 0 0 1 10 -5 Z" fill="#0F0A1E" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
    </path>
    <!-- soft loop pulse ring -->
    <circle cx="396" cy="396" r="74" fill="none" stroke="#F0ABFC" stroke-width="4" opacity="0">
      <animate attributeName="r" values="74;104" keyTimes="0;1" dur="1.6s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" keyTimes="0;1" dur="1.6s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>