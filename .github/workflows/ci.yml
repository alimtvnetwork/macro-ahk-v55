      - name: Upload XPath dist
        uses: actions/upload-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3b: Build Macro Controller (parallel with 3a, 3c)
  # ════════════════════════════════════════════════════════════
  build-macro-controller:
    name: Build · Macro Controller
    needs: build-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-mc-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-mc-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      # Persist the compiled macro-looping.css across CI runs so we skip
      # the LESS compile step entirely when no *.less source changed. The
      # compile-less.mjs helper validates the cached output via a SHA-256
      # fingerprint sidecar (.cache/macro-looping.css.fingerprint.json),
      # so a stale cache is detected and recompiled automatically.
      - name: Cache macro-looping.css (LESS output)
        uses: actions/cache@v4
        with:
          path: |
            standalone-scripts/macro-controller/dist/macro-looping.css
            standalone-scripts/macro-controller/dist/.cache
          key: ${{ runner.os }}-macro-less-${{ hashFiles('standalone-scripts/macro-controller/less/**/*.less', 'scripts/compile-less.mjs', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-macro-less-

      - name: Cache standalone build · macro-controller
        uses: actions/cache@v4
        with:
          path: |
            .cache/standalone-builds/macro-controller
            .cache/tsbuildinfo/macro-controller.tsbuildinfo
          key: ${{ runner.os }}-stdbuild-macro-controller-${{ hashFiles('standalone-scripts/macro-controller/src/**', 'standalone-scripts/macro-controller/instruction.ts', 'standalone-scripts/macro-controller/package.json', 'tsconfig.macro-controller.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.macro-controller.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stdbuild-macro-controller-

      - name: Build Macro Controller
        run: pnpm run build:macro-controller

      - name: Upload Macro Controller dist
        uses: actions/upload-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3c: Build Prompts (parallel with 3a, 3b)
  # ════════════════════════════════════════════════════════════
  build-prompts:
    name: Build · Prompts
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
