          restore-keys: |
            ${{ runner.os }}-nm-prompts-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build Prompts
        run: pnpm run build:prompts

      - name: Upload Prompts
        uses: actions/upload-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3d: Build Payment Banner Hider (parallel with 3a/3b/3c)
  #
  # No SDK dependency (instruction.ts → dependencies: []), so this
  # runs straight off `setup` instead of waiting for build-sdk like
  # build-xpath / build-macro-controller do.
  #
  # Listed in build-extension's `needs:` (above, line ~641) so the
  # extension build can download the `payment-banner-hider-dist`
  # artifact and pass the strict registry check
  # (scripts/report-standalone-registry.mjs --strict, location
  # `ciJob` → `.github/workflows/ci.yml build-payment-banner-hider`).
  # ════════════════════════════════════════════════════════════
  build-payment-banner-hider:
    name: Build · Payment Banner Hider
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-pbh-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-pbh-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Cache standalone build · payment-banner-hider
        uses: actions/cache@v4
        with:
          path: |
            .cache/standalone-builds/payment-banner-hider
            .cache/tsbuildinfo/payment-banner-hider.tsbuildinfo
          key: ${{ runner.os }}-stdbuild-payment-banner-hider-v2-xpathfix-${{ hashFiles('standalone-scripts/payment-banner-hider/src/**', 'standalone-scripts/payment-banner-hider/instruction.ts', 'standalone-scripts/payment-banner-hider/package.json', 'tsconfig.payment-banner-hider.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.payment-banner-hider.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stdbuild-payment-banner-hider-v2-xpathfix-

      - name: Build Payment Banner Hider
        run: pnpm run build:payment-banner-hider

      # Sanity-check the local dist BEFORE uploading. If the build
      # produced an empty bundle we want to fail HERE (with build
      # logs in scope), not in build-extension's pre-build assertion
      # 5 minutes later. Reuses the shared assertion script so the
      # error format is identical to the downstream check.
      - name: Self-assert dist (pre-upload)
        run: |
          node scripts/assert-standalone-dist.mjs \
            --script-name payment-banner-hider \
            --dist-dir standalone-scripts/payment-banner-hider/dist \
            --bundle payment-banner-hider.js \
            --artifact-name "payment-banner-hider-dist (pre-upload, local)" \
            --vite-config standalone-scripts/payment-banner-hider/vite.config.ts \
            --min-bytes 100

      - name: Upload Payment Banner Hider dist
        uses: actions/upload-artifact@v4
        with:
          name: payment-banner-hider-dist
          path: standalone-scripts/payment-banner-hider/dist/
          retention-days: 1

      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🧱 Build · Payment Banner Hider"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Artifact name | \`payment-banner-hider-dist\` |"
            echo "| Source path | \`standalone-scripts/payment-banner-hider/dist/\` |"
            echo "| Consumed by | \`build-extension\`, \`e2e-payment-banner-hider\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════
  # Job 3e: E2E · Payment Banner Hider
  #
  # Standalone smoke test — verifies the freshly-built
  # payment-banner-hider bundle by importing it in a Node sandbox
  # and running its instruction-driven self-test. Does NOT need
  # the full Chrome extension build, so it runs in parallel with
  # build-extension (saves ~3 min on the critical path).
  #
  # Gated by the shared assertion script so we never run the
  # smoke test on a broken artifact — same precise error annotation
  # as the build-extension pre-build gate.
  # ════════════════════════════════════════════════════════════
  e2e-payment-banner-hider:
    name: E2E · Payment Banner Hider
    needs: build-payment-banner-hider
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `actions: read` is required for `gh api .../actions/runs/.../artifacts`
    # used by the "Resolve payment-banner-hider artifact URL + id" step.
    # The workflow-level default (`contents: read`) is insufficient and
    # produces a 403 "Resource not accessible by integration".
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-pbh-e2e-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-pbh-e2e-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download Payment Banner Hider dist
        id: download-pbh
        uses: actions/download-artifact@v4
        with:
          name: payment-banner-hider-dist
          path: standalone-scripts/payment-banner-hider/dist/

      # Same artifact-trace pattern as build-extension so the smoke
      # job logs also expose the one-click artifact URL when debugging.
      - name: Resolve payment-banner-hider artifact URL + id
        id: trace-pbh-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: payment-banner-hider-dist
        run: |
          set -euo pipefail
          ARTIFACT_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\")")

          if [ -z "${ARTIFACT_JSON}" ]; then
            echo "::error title=Artifact metadata lookup failed::Could not find artifact '${ARTIFACT_NAME}' on run ${GITHUB_RUN_ID}."
            exit 1
          fi

          ARTIFACT_ID=$(echo "${ARTIFACT_JSON}" | jq -r '.id')
          BROWSER_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${ARTIFACT_ID}"
          API_URL=$(echo "${ARTIFACT_JSON}" | jq -r '.archive_download_url')

          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_id=${ARTIFACT_ID}" >> "$GITHUB_OUTPUT"
          echo "browser_download_url=${BROWSER_URL}" >> "$GITHUB_OUTPUT"
          echo "archive_download_url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Assert payment-banner-hider dist artifact present
        run: |
          node scripts/assert-standalone-dist.mjs \
            --script-name payment-banner-hider \
            --dist-dir standalone-scripts/payment-banner-hider/dist \
            --bundle payment-banner-hider.js \
            --artifact-name "${{ steps.trace-pbh-artifact.outputs.artifact_name }}" \
            --artifact-id "${{ steps.trace-pbh-artifact.outputs.artifact_id }}" \
            --artifact-url "${{ steps.trace-pbh-artifact.outputs.browser_download_url }}" \
            --artifact-api-url "${{ steps.trace-pbh-artifact.outputs.archive_download_url }}" \
            --vite-config standalone-scripts/payment-banner-hider/vite.config.ts \
            --min-bytes 100

      - name: Smoke-test bundle in Node sandbox
        # The bundle is an IIFE that registers itself on window.
        # Run it under a minimal jsdom-free shim so we get a clear
        # SyntaxError / ReferenceError if the bundle is malformed,
        # without booting a full browser.
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            import { runInNewContext } from 'node:vm';
            const bundlePath = 'standalone-scripts/payment-banner-hider/dist/payment-banner-hider.js';
            const src = readFileSync(bundlePath, 'utf8');

            if (src.length < 100) {
              console.error('::error::Bundle is suspiciously small (' + src.length + ' bytes)');
              process.exit(1);
            }

            // Minimal window/document shim so an IIFE that touches DOM
            // doesn't crash on load. We only validate the bundle parses
            // and runs to completion — no behavioural assertion here
            // (that lives in the Playwright e2e suite).
            const noop = () => {};
            const fakeXPathResult = {
              FIRST_ORDERED_NODE_TYPE: 9,
              ORDERED_NODE_SNAPSHOT_TYPE: 7,
            };
            class FakeMutationObserver {
              observe() {}
              disconnect() {}
            }
            const fakeWindow = {
              addEventListener: noop, removeEventListener: noop,
              RiseupAsiaMacroExt: { Projects: {} },
              location: { hostname: 'lovable.dev', href: 'https://lovable.dev/' },
              XPathResult: fakeXPathResult,
              MutationObserver: FakeMutationObserver,
              setTimeout, clearTimeout,
            };
            const fakeDocument = {
              addEventListener: noop, removeEventListener: noop,
              readyState: 'complete',
              evaluate: () => ({ singleNodeValue: null, snapshotLength: 0, snapshotItem: () => null }),
              querySelector: () => null, querySelectorAll: () => [],
              body: { appendChild: noop }, head: { appendChild: noop },
              createElement: () => ({ style: {}, setAttribute: noop, appendChild: noop }),
            };
            const sandbox = {
              console,
              queueMicrotask,
              setTimeout,
              clearTimeout,
              window: fakeWindow,
              document: fakeDocument,
              XPathResult: fakeXPathResult,
              MutationObserver: FakeMutationObserver,
            };

            try {
              runInNewContext(src, sandbox, { filename: bundlePath, timeout: 5000 });
              console.log('✅ Bundle loaded and executed without throwing.');
            } catch (err) {
              console.error('::error file=' + bundlePath + '::Bundle threw on execution: ' + err.message);
              process.exit(1);
            }
          "

      - name: Smoke summary
        if: always()
        run: |
          {
            echo "## 🧪 E2E · Payment Banner Hider — smoke result"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Artifact | \`payment-banner-hider-dist\` |"
            echo "| Bundle | \`standalone-scripts/payment-banner-hider/dist/payment-banner-hider.js\` |"
            echo "| Source job | \`build-payment-banner-hider\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════
  # Job 3f: Casing Gate · per-project matrix
  #
  # Runs `pnpm run check:instruction-json-casing standalone-scripts/<name>`
  # ONCE PER PROJECT in a matrix, so the GitHub Actions checks tab
  # surfaces a separate green/red row per standalone script
  # (`Casing · marco-sdk`, `Casing · xpath`, …). When a regression
  # lands, a reviewer immediately sees WHICH project's instruction
  # JSON drifted — no need to grep through a single combined log.
  #
  # Each matrix leg downloads only the one `<name>-dist` artifact it
  # needs (so a broken upstream `build-xpath` only fails the `xpath`
  # leg, not all four). The shared no-arg variant of this script
  # also runs inside `build-extension` as a final sweep — the matrix
  # is the per-project visibility layer, the in-build call is the
  # last-line gate before vite copies the JSON files into the
  # extension bundle.
  #
  # Matrix entries are AUTO-DERIVED at runtime by
  # `scripts/derive-casing-matrix.mjs` from
  # `scripts/check-standalone-dist.mjs` (`REQUIRED_ARTIFACTS`) — adding
  # a new project no longer requires hand-editing this matrix block.
  # The derive script also self-checks that the static `needs:` list
  # below still covers every derived `build-<name>` job (a fail-fast
  # safety net for the ONE remaining manual edit, since GitHub Actions
  # `needs:` cannot be expression-evaluated).
  # ════════════════════════════════════════════════════════════

  # Job 3f-pre: Derive casing matrix
  #
  # Tiny no-install job (~5 s). Reads `REQUIRED_ARTIFACTS` from
  # `scripts/check-standalone-dist.mjs`, cross-checks that every project
  # has both `standalone-scripts/<name>/src/instruction.ts` and a
  # `build-<name>:` (or legacy `build-sdk:`) job in this workflow, then
  # publishes a `matrix` output that the matrix-fanned-out
  # `casing-instruction-json` job consumes via `fromJSON()`.
  derive-casing-matrix:
    name: "Casing · derive matrix"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    outputs:
      matrix: ${{ steps.derive.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Self-check FIRST — if `needs:` of casing-instruction-json drifted
      # from the derived matrix, fail loudly here rather than letting a
      # newly-added project silently skip the casing gate at merge time.
      - name: Self-check static needs:/derived matrix alignment
        run: node scripts/derive-casing-matrix.mjs --check

      - name: Derive matrix and publish as job output
        id: derive
        run: node scripts/derive-casing-matrix.mjs --github-output

  # Job 3f-pre2: Self-test the casing checker's annotation cap.
  #
  # The four real `standalone-scripts/*` projects are all clean, so the
  # `casing-instruction-json` matrix never exercises the truncation
  # branch in `check-instruction-json-casing.mjs` (per-key annotation
  # cap = MAX_ANNOTATIONS, default 50). A regression that breaks the
  # cap (off-by-one summary, unbounded annotations drowning the PR
  # Files-Changed view, missing summary line, etc.) would slip through
  # CI silently. This tiny no-install job builds a synthetic project
  # with > cap PascalCase violations and asserts the exact emitted
  # annotation shape.
  #
  # Wired as a peer of `derive-casing-matrix` so it runs in parallel
  # and surfaces independently in the Checks tab. Both `pull_request`
  # and pushes to `main` run it (matches `casing-instruction-json`).
  # ────────────────────────────────────────────────────────────
  # Job 3f-pre2a: Path-filter preflight for the self-test.
  #
  # The self-test only validates the casing checker's truncation
  # branch, so it has zero signal when the change doesn't touch:
  #   • scripts/check-instruction-json-casing.mjs        (the checker)
  #   • scripts/__tests__/check-instruction-json-casing-truncation*.test.mjs
  #     (the fixtures it runs)
  #   • .github/workflows/ci.yml                          (the job def)
  #
  # Skipping it on unrelated PRs (UI tweaks, copy edits, image swaps)
  # saves ~10 s of runner time per PR and removes a redundant green
  # check from the PR Checks tab. We keep it zero-dep — pure git +
  # bash, no third-party action — to match the style of the other
  # preflight jobs above.
  #
  # On `push to main` the BEFORE SHA may be the zero-SHA on a
  # newly-pushed branch's first commit; in that case we conservatively
  # mark the paths as changed so the self-test still runs.
  # ────────────────────────────────────────────────────────────
  casing-checker-self-test-paths:
    name: "Casing · self-test (paths preflight)"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need history to diff PR head vs base, or push HEAD vs BEFORE.
          fetch-depth: 0

      - name: Detect changes to checker / fixtures / workflow
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # Resolve the diff range based on event type.
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="$BASE_SHA...$HEAD_SHA"
          else
            # push: BEFORE may be 000…0 on the first push of a branch.
            if [ -z "${BEFORE_SHA:-}" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              echo "First-push (no BEFORE SHA) — running self-test conservatively."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            RANGE="$BEFORE_SHA...${GITHUB_SHA}"
          fi

          echo "Diffing range: $RANGE"
          CHANGED_FILES="$(git diff --name-only "$RANGE" || true)"
          echo "$CHANGED_FILES"

          # Match: the checker, its truncation tests, and this workflow.
          if echo "$CHANGED_FILES" | grep -E -q \
            -e '^scripts/check-instruction-json-casing\.mjs$' \
            -e '^scripts/__tests__/check-instruction-json-casing-truncation(-snapshot)?\.test\.mjs$' \
            -e '^\.github/workflows/ci\.yml$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Relevant files changed → self-test will run."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No relevant files changed → self-test will be skipped."
          fi

  casing-checker-self-test:
    name: "Casing · checker self-test (truncation)"
    runs-on: ubuntu-latest
    needs: casing-checker-self-test-paths
    # Run only when the paths preflight detected a change to the
    # checker, its truncation tests, or this workflow file.
    if: needs.casing-checker-self-test-paths.outputs.changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Zero-dep test (uses `node:test` from Node 20 stdlib). No
      # `pnpm install` needed — keeps this job under ~10 s end-to-end.
      - name: Run truncation fixture tests (counts + line snapshot)
        run: node --test scripts/__tests__/check-instruction-json-casing-truncation.test.mjs scripts/__tests__/check-instruction-json-casing-truncation-snapshot.test.mjs

  # ════════════════════════════════════════════════════════════
  # Casing matrix — validate instruction.json casing per project
  # (Referenced by build-extension `needs:` as `casing-instruction-json`.)
  # ════════════════════════════════════════════════════════════
  casing-instruction-json:
    name: "Casing · ${{ matrix.project }}"
    runs-on: ubuntu-latest
    # Run on PRs and every branch push so Lovable/GitHub branch commits
    # surface casing regressions before a PR exists. Any future trigger
    # added to this workflow (workflow_dispatch, schedule, release, etc.)
    # still skips this job unless explicitly allowed here.
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    needs:
      # NOTE: `needs:` MUST be literal YAML (GitHub Actions does not
      # expand expressions here). When you add a new project to
      # `REQUIRED_ARTIFACTS`, also add its `build-<name>` job below.
      # The `derive-casing-matrix` job's `--check` step will fail CI
      # if these two lists drift, so this is a soft-required edit.
      - derive-casing-matrix
      - build-sdk
      - build-xpath
      - build-payment-banner-hider
      - build-macro-controller
      - build-lovable-common
      - build-lovable-owner-switch
      - build-lovable-user-add
      - build-lovable-dashboard

    strategy:
      # Don't short-circuit the other legs when one project fails —
      # we want EVERY failing project surfaced in the same run so a
      # multi-project regression doesn't require N CI re-runs to
      # uncover.
      fail-fast: false
      matrix:
        # Auto-derived from REQUIRED_ARTIFACTS. See the
        # `derive-casing-matrix` job above and
        # `scripts/derive-casing-matrix.mjs` for the source of truth.
        include: ${{ fromJSON(needs.derive-casing-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # No install needed — the script is zero-dep node. Skipping
      # `pnpm install` keeps each matrix leg under ~15 s end-to-end.

      - name: Download ${{ matrix.project }} dist
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist-path }}

      # ── Early failsafe: assert the artifact actually unpacked. ─────
      # Without this guard a missing or empty artifact (typo in the
      # `artifact:` matrix key, an upstream build job that exited 0
      # without emitting `dist/`, a retention-window expiry on a
      # re-run, etc.) would slip past `download-artifact@v4` (which
      # only fails when the named artifact is missing entirely — an
      # *empty* artifact, or one where the dist-path folder is absent
      # post-download, exits 0 silently). The casing checker would
      # then run, see no `dist/instruction.json`, treat the project as
      # "missing artifacts" and exit 2 — surfacing as a confusing
      # generic failure 30 s later instead of a one-line root cause.
      #
      # This step fails immediately with a precise `::error` annotation
      # naming the missing folder + both expected files, so the PR
      # Checks tab shows the exact reason in red without anyone
      # having to scroll the log. `exit 1` short-circuits the rest of
      # the matrix leg (validate, publish-summary) — those steps would
      # all repeat the same error in different shapes.
      - name: Assert downloaded dist artifact is present and complete
        run: |
          DIST="${{ matrix.dist-path }}"
          ARTIFACT="${{ matrix.artifact }}"
          PROJECT="${{ matrix.project }}"
          CANONICAL="$DIST/instruction.json"
          # NOTE (Phase 2c): instruction.compat.json is no longer emitted.
          # Only the canonical PascalCase instruction.json is required.

          if [ ! -d "$DIST" ]; then
            echo "::error file=.github/workflows/ci.yml,title=Missing dist folder after artifact download::Project '$PROJECT' — expected dist folder '$DIST' does not exist after downloading artifact '$ARTIFACT'. Upstream build job (build-${PROJECT}) may have exited 0 without emitting dist/, OR the artifact name is mis-mapped in the matrix include block. Fix the upstream build OR correct the matrix entry { project: $PROJECT, artifact: $ARTIFACT, dist-path: $DIST }."
            exit 1
          fi

          if [ ! -f "$CANONICAL" ]; then
            echo "Contents of '$DIST' after download:"
            ls -la "$DIST" || true
            echo "::error file=$DIST,title=Missing instruction artifact after download::Project '$PROJECT' — required file '$CANONICAL' (canonical PascalCase) is missing from artifact '$ARTIFACT'. Likely cause: build-${PROJECT} did not run scripts/compile-instruction.mjs."
            exit 1
          fi

          echo "✅ Artifact '$ARTIFACT' downloaded and unpacked into '$DIST':"
          echo "   • $CANONICAL ($(stat -c%s "$CANONICAL") bytes)"

      - name: Validate ${{ matrix.project }} instruction casing
        run: node scripts/check-instruction-json-casing.mjs standalone-scripts/${{ matrix.project }}

      # Passing-state summary. Only runs when the validator above
      # exited 0, so the appearance of this line in the log is a
      # positive signal — both files were scanned and conform to
      # their respective casing standard. Spells out the exact
      # contract so a reviewer scanning the log doesn't have to
      # cross-reference mem://standards/pascalcase-json-keys.
      - name: ✅ Casing standards validated for ${{ matrix.project }}
        if: success()
        run: |
          echo "✅ Casing standards validated for '${{ matrix.project }}':"
          echo "   • dist/instruction.json — PascalCase keys only (canonical)"
          echo "   See: mem://standards/pascalcase-json-keys"

      # Run again in --json mode and stash the report on the run
      # summary so a failed leg has a parseable artefact attached
      # without re-running the workflow. Always-on so a passing leg
      # also publishes its (empty-violation) baseline for trend
      # tracking. The header line above the JSON block restates the
      # casing contract explicitly so the GITHUB_STEP_SUMMARY page
      # is self-documenting on both pass and fail.
      - name: Publish JSON report to step summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="❌"; fi
          {
            echo "### ${ICON} Casing report — \`${{ matrix.project }}\`"
            echo ""
            echo "**Standards enforced:**"
            echo "- \`dist/instruction.json\` → PascalCase keys only (canonical)"
            
            echo ""
            echo '```json'
            node scripts/check-instruction-json-casing.mjs --json standalone-scripts/${{ matrix.project }} || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════
  # Job 2f1: Prompt info.json PascalCase compliance
  # ════════════════════════════════════════════════════════════
  casing-prompt-info:
    name: "Casing · prompt info.json"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Zero-dep — no install needed.
      - name: Validate prompt info.json PascalCase compliance
        run: node scripts/check-prompt-info-casing.mjs

  # ════════════════════════════════════════════════════════════
  # Job 3g: Import/Export E2E
  #
  # Runs the dedicated import-export round-trip test suite against
  # the REAL exporter + importer (sql.js WASM, JSZip, mocked bridge).
  # Validates archive structure, schema PascalCase, project/script/config
  # round-trips, prompt byte-equality, bundle determinism, and negative
  # cases (corrupt zip, missing DB, non-PascalCase schema, unknown tables).
  #
  # No build artifacts required — only node_modules + source tree.
  # ════════════════════════════════════════════════════════════
  import-export-e2e:
    name: E2E · Import/Export Round-trip
    # Runs after derive-casing-matrix so the casing registry shared by the
    # bundle round-trip is already validated. See spec/30-import-export/03-test-plan.md §6.
    needs: [setup, derive-casing-matrix]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-ie-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-ie-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      # Aggregate prompts so MD→JSON intermediate is present for the fixture.
      - name: Aggregate prompts
        run: node scripts/aggregate-prompts.mjs

      - name: Run Import/Export E2E tests
        run: npx vitest run src/test/import-export/ --reporter=github-actions

      # Forensic artifact for failed runs. The setup helper writes the
      # produced zip to node_modules/.cache/marco-fixture/ when present;
      # we tar the test directory as a fallback so a failure always
      # leaves something inspectable.
      - name: Upload fixture bundle (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: import-export-fixture-bundle
          path: |
            node_modules/.cache/marco-fixture/**
            src/test/import-export/**
          if-no-files-found: warn
          retention-days: 7


  # ════════════════════════════════════════════════════════════
  # Job 4: Build Chrome Extension (depends on all standalone)
  # ════════════════════════════════════════════════════════════
  build-extension:
    name: Build · Chrome Extension
    needs: [spec-links, markdown-filename-policy, no-nested-template-literals, eslint-run-summary-types, contract-checkers-wired, cicd-index-sync, p0-rules-audit, madge-cycles-floor, strict-flag-fallout, pascalcase-instruction-migration, report-standalone-registry, readme-conventions, typecheck-app, typecheck-standalone, typecheck-clean, lint-standalone, build-sdk, build-xpath, build-payment-banner-hider, build-macro-controller, build-prompts, casing-instruction-json, import-export-e2e]
    runs-on: ubuntu-latest
    # `actions: read` is required for `gh api .../actions/runs/.../artifacts`
    # used by the "Resolve payment-banner-hider artifact URL + id" step.
    # Workflow-level default (`contents: read`) → 403 "Resource not
    # accessible by integration".
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-ext-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-ext-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Download XPath dist
        uses: actions/download-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/

      - name: Download Macro Controller dist
        uses: actions/download-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/

      - name: Download Prompts
        uses: actions/download-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/

      - name: Download Payment Banner Hider dist
        id: download-payment-banner-hider
        uses: actions/download-artifact@v4
        with:
          name: payment-banner-hider-dist
          path: standalone-scripts/payment-banner-hider/dist/

      - name: Download Lovable Common dist
        uses: actions/download-artifact@v4
        with:
          name: lovable-common-dist
          path: standalone-scripts/lovable-common/dist/

      - name: Download Lovable Owner Switch dist
        uses: actions/download-artifact@v4
        with:
          name: lovable-owner-switch-dist
          path: standalone-scripts/lovable-owner-switch/dist/

      - name: Download Lovable User Add dist
        uses: actions/download-artifact@v4
        with:
          name: lovable-user-add-dist
          path: standalone-scripts/lovable-user-add/dist/

      - name: Download Lovable Dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: lovable-dashboard-dist
          path: standalone-scripts/lovable-dashboard/dist/



      # ── Artifact traceability ───────────────────────────────────
      # When a downstream step says "bundle missing", the first
      # question is always: WHICH artifact did we actually pull?
      # Resolve the exact `artifact-id` and `archive_download_url`
      # via the GitHub REST API and print them so a reviewer can
      # one-click open the artifact in the Actions UI without having
      # to grep through the run page. Also exported as step outputs
      # so later steps can reference them in their own summaries.
      - name: Resolve payment-banner-hider artifact URL + id
        id: trace-payment-banner-hider-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: payment-banner-hider-dist
        run: |
          set -euo pipefail

          echo "── Resolving artifact metadata for '${ARTIFACT_NAME}' ──"
          echo "   repo:    ${GITHUB_REPOSITORY}"
          echo "   run_id:  ${GITHUB_RUN_ID}"

          # List artifacts for this run, pick the one we just downloaded.
          # Using `gh api` (preinstalled on ubuntu runners) keeps this
          # zero-dep — no extra `actions/github-script` setup required.
          ARTIFACT_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\")")

          if [ -z "${ARTIFACT_JSON}" ]; then
            echo "::error title=Artifact metadata lookup failed::Could not find artifact '${ARTIFACT_NAME}' on run ${GITHUB_RUN_ID}. The download step reported success but the API does not list it — this usually means the upload step in 'build-payment-banner-hider' did not run or used a different name."
            exit 1
          fi

          ARTIFACT_ID=$(echo "${ARTIFACT_JSON}" | jq -r '.id')
          ARTIFACT_SIZE=$(echo "${ARTIFACT_JSON}" | jq -r '.size_in_bytes')
          ARTIFACT_SHA=$(echo "${ARTIFACT_JSON}" | jq -r '.workflow_run.head_sha // "unknown"')
          ARTIFACT_EXPIRES=$(echo "${ARTIFACT_JSON}" | jq -r '.expires_at')
          # `archive_download_url` is the API URL (requires auth).
          # The browser-friendly URL is the one humans can click.
          ARCHIVE_DOWNLOAD_URL=$(echo "${ARTIFACT_JSON}" | jq -r '.archive_download_url')
          BROWSER_DOWNLOAD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${ARTIFACT_ID}"

          echo "✅ Artifact resolved"
          echo "   artifact_name:        ${ARTIFACT_NAME}"
          echo "   artifact_id:          ${ARTIFACT_ID}"
          echo "   size_in_bytes:        ${ARTIFACT_SIZE}"
          echo "   head_sha:             ${ARTIFACT_SHA}"
          echo "   expires_at:           ${ARTIFACT_EXPIRES}"
          echo "   archive_download_url: ${ARCHIVE_DOWNLOAD_URL}"
          echo "   browser_download_url: ${BROWSER_DOWNLOAD_URL}"

          # Export for later steps (e.g. the assertion summary table).
          {
            echo "artifact_name=${ARTIFACT_NAME}"
            echo "artifact_id=${ARTIFACT_ID}"
            echo "artifact_size=${ARTIFACT_SIZE}"
            echo "archive_download_url=${ARCHIVE_DOWNLOAD_URL}"
            echo "browser_download_url=${BROWSER_DOWNLOAD_URL}"
          } >> "$GITHUB_OUTPUT"

          # Top-of-summary block so the trace is the FIRST thing a
          # reviewer sees on a failed run, not buried after build logs.
          {
            echo "## 🔗 Artifact trace — \`${ARTIFACT_NAME}\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Artifact name | \`${ARTIFACT_NAME}\` |"
            echo "| Artifact ID | \`${ARTIFACT_ID}\` |"
            echo "| Size (bytes) | \`${ARTIFACT_SIZE}\` |"
            echo "| Head SHA | \`${ARTIFACT_SHA}\` |"
            echo "| Expires at | \`${ARTIFACT_EXPIRES}\` |"
            echo "| Browser URL (one-click) | [${BROWSER_DOWNLOAD_URL}](${BROWSER_DOWNLOAD_URL}) |"
            echo "| API archive URL | \`${ARCHIVE_DOWNLOAD_URL}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Pre-build artifact assertion ────────────────────────────
      # Hard gate run BEFORE `pnpm run build:extension` so a missing
      # payment-banner-hider artifact fails fast with a precise
      # error pointing at the exact file the extension build expects.
      # Uses the shared `scripts/assert-standalone-dist.mjs` helper
      # so the same precise failure pattern can be reused for every
      # other standalone artifact (sdk, xpath, macro-controller, …)
      # by adding one short step per artifact instead of duplicating
      # 60 lines of inline shell.
      - name: Assert payment-banner-hider dist artifact present
        run: |
          node scripts/assert-standalone-dist.mjs \
            --script-name payment-banner-hider \
            --dist-dir standalone-scripts/payment-banner-hider/dist \
            --bundle payment-banner-hider.js \
            --artifact-name "${{ steps.trace-payment-banner-hider-artifact.outputs.artifact_name }}" \
            --artifact-id "${{ steps.trace-payment-banner-hider-artifact.outputs.artifact_id }}" \
            --artifact-url "${{ steps.trace-payment-banner-hider-artifact.outputs.browser_download_url }}" \
            --artifact-api-url "${{ steps.trace-payment-banner-hider-artifact.outputs.archive_download_url }}" \
            --vite-config standalone-scripts/payment-banner-hider/vite.config.ts \
            --min-bytes 100

      # ── Casing gate on downloaded standalone dists ──────────────
      # Validates every standalone-scripts/<name>/dist/instruction.json
      # (PascalCase only) BEFORE `pnpm run build:extension` invokes
      # vite, whose copyProjectScripts plugin copies the canonical JSON
      # into chrome-extension/projects/scripts/<name>/. Phase 2c retired
      # instruction.compat.json, so a missing compat snapshot is valid.
      # The same script also runs inline inside every build:* chain
      # (defence in depth) — this explicit CI step makes the gate visible
      # in the Actions UI as a separate green/red check rather than buried
      # inside the build log.
      - name: Validate instruction.json casing (PascalCase only)
        run: pnpm run check:instruction-json-casing

      # Passing-state summary — only emits when the validator above
      # exited 0. Spells out the contract enforced across all four
      # standalone projects so a reviewer scrolling the build log
      # gets a positive confirmation instead of just absence-of-error.
      - name: ✅ Casing standards validated for all standalone projects
        if: success()
        run: |
          echo "✅ Casing standards validated across all standalone-scripts/*/dist artifacts:"
          echo "   • dist/instruction.json — PascalCase keys only (canonical)"
          {
            echo "### ✅ Build-extension casing gate"
            echo ""
            echo "All standalone projects passed before vite copied JSON into the extension bundle:"
            echo "- \`dist/instruction.json\` → **PascalCase keys only** (canonical)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Chrome extension
        run: pnpm run build:extension

      - name: Verify no source maps in dist
        run: |
          MAP_FILES=$(find chrome-extension -name '*.map' 2>/dev/null || true)
          if [ -n "$MAP_FILES" ]; then
            echo "::error::Source map files found in dist — production builds must not include .map files:"
            echo "$MAP_FILES"
            exit 1
          fi
          echo "✅ No source map files in dist"

      # Upload the bundled extension folder so downstream jobs (CSP verifier,
      # any future browser-based smoke tests) can validate the exact artifact
      # without re-running the full build.
      - name: Upload Chrome extension dist
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-dist
          path: chrome-extension/
          retention-days: 1

      - name: Build summary
        run: |
          echo "=== CI Build Complete ==="
          echo "Commit: ${GITHUB_SHA:0:8}"
          echo "Lint: OK | Tests: OK | Build: OK | No source maps: OK"

  # ════════════════════════════════════════════════════════════
  # Job 5: Verify Built Manifest CSP — early gate for browser-based jobs
  #
  # Runs the post-build CSP guard against the EXACT chrome-extension/
  # artifact produced by build-extension. Fails fast if
  # `content_security_policy.extension_pages` is missing
  # `'wasm-unsafe-eval'`, which would crash sql.js at runtime with a
  # CompileError under MV3's default `script-src 'self'`.
  #
  # Any future browser-based smoke test (Playwright, headless Chrome
  # MV3 load, etc.) MUST list this job in its `needs:` so we never burn
  # browser-runner minutes on a build that can't boot the extension.
  # ════════════════════════════════════════════════════════════
  verify-built-manifest-csp:
    name: Verify · Built manifest CSP (wasm-unsafe-eval)
    needs: build-extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download built Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-dist
          path: chrome-extension/

      - name: Show built manifest (for log auditability)
        run: |
          echo "─── chrome-extension/manifest.json ───"
          if [ ! -f chrome-extension/manifest.json ]; then
            echo "::error::chrome-extension/manifest.json missing in downloaded artifact"
            ls -la chrome-extension/ || true
            exit 1
          fi
          # Keep the printed snippet small but include the CSP block.
          node -e "const m=require('./chrome-extension/manifest.json'); console.log(JSON.stringify({version:m.version,name:m.name,content_security_policy:m.content_security_policy},null,2));"

      - name: Scan built manifest for wasm-unsafe-eval (script-only fallback)
        # Belt-and-braces: a pure shell grep so even if the Node validator
        # below is broken, this step still catches a missing directive.
        run: |
          if ! grep -F "'wasm-unsafe-eval'" chrome-extension/manifest.json > /dev/null; then
            echo "::error file=chrome-extension/manifest.json::Built manifest is missing 'wasm-unsafe-eval' in content_security_policy.extension_pages — sql.js will fail to compile its WASM at runtime under the default MV3 CSP."
            exit 1
          fi
          echo "✅ grep: 'wasm-unsafe-eval' present in built manifest"

      - name: Run check-built-manifest-csp validator
        # Authoritative check — same script developers run locally
        # (pnpm run check:built-csp) and that build:extension chains.
        run: node scripts/check-built-manifest-csp.mjs

  # ════════════════════════════════════════════════════════════
  # Job 6: E2E — Playwright + headed Chromium under xvfb
  #
  # Closes the carried-over E2E verification gap from
  # `.lovable/pending-issues/02-e2e-verification-react-ui.md`.
  #
  # Chrome extensions REQUIRE a real headed Chromium with
  # `--load-extension`; Playwright's headless-shell cannot load them.
  # We use the full chromium browser and drive it under xvfb-run on
  # Linux runners. Spec coverage (74 tests / 22 files) covers all 10
  # checklist items: popup, options, project CRUD, scripts CRUD,
  # XPath recorder, log export, SQLite import/export, context menus,
  # hot-reload, preview env. See `tests/e2e/`.
  #
  # Gates: needs the same artifact path as verify-built-manifest-csp
  # so we never spin up a browser on a build that can't boot.
  # ════════════════════════════════════════════════════════════
  e2e:
    name: E2E · Playwright (Chrome extension)
    needs: [build-extension, verify-built-manifest-csp]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download built Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-dist
          path: dist/

      - name: Install Playwright browsers (chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Playwright E2E suite under xvfb (excluding dedicated E2E-23)
        env:
          CI: 'true'
        # E2E-23 is intentionally excluded from the broad suite because it has
        # its own job below with an explicit browser install and retry budget.
        # Keeping it in both jobs made the non-retry broad suite fail first.
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            pnpm exec playwright test --grep-invert "E2E-23|Multi-Tab State Synchronization"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/html
          retention-days: 7

      - name: Upload Playwright artifacts (traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/artifacts
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # Job 6b: E2E-02 (Project CRUD) with extended timeouts + slow-step report
  #
  # Re-runs only `tests/e2e/e2e-02-project-crud.spec.ts` with a much
  # larger per-test budget (3× the standard 60 s) so a slow CRUD step
  # no longer fails the whole suite outright. The companion reporter
  # `tests/e2e/reporters/slow-step-reporter.ts` flags every step that
  # exceeds the original 60 s threshold (overridable via
  # SLOW_STEP_THRESHOLD_MS) — both in the job log and as
  # `::warning file=…,line=…::` annotations on the PR diff view, so
  # creeping slowness shows up before it becomes a hard failure.
  #
  # `continue-on-error: true` keeps this job advisory: it surfaces
  # slow steps without blocking merge while we triage them.
  # ════════════════════════════════════════════════════════════
  e2e-02-extended:
    name: E2E-02 · Project CRUD (extended timeout, slow-step report)
    needs: [build-extension, verify-built-manifest-csp]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download built Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-dist
          path: dist/

      - name: Install Playwright browsers (chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run E2E-02 with extended per-test timeout (180s) + slow-step reporter
        env:
          CI: 'true'
          # 3× the default 60s budget — keeps the test passing while we
          # surface which steps are slow via the reporter.
          PLAYWRIGHT_TEST_TIMEOUT_MS: '180000'
          # Threshold below which a step is considered fine. Anything
          # ≥ this (default: original 60s budget) is flagged.
          SLOW_STEP_THRESHOLD_MS: '60000'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            pnpm exec playwright test tests/e2e/e2e-02-project-crud.spec.ts \
              --timeout=180000 \
              --reporter=list,./tests/e2e/reporters/slow-step-reporter.ts

      - name: Upload Playwright artifacts (E2E-02 extended)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-e2e-02-extended
          path: test-results/artifacts
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # Job 6c: E2E-23 (Multi-Tab State Synchronization)
  #
  # Runs only `tests/e2e/e2e-23-multi-tab-sync.spec.ts` with an
  # explicit `npx playwright install` step before execution so the
  # Chromium binary is present even if the cache layer or the prior
  # `--with-deps` install was skipped. Test uses its own
  # test.setTimeout(180_000) for the cross-tab Monaco/onboarding
  # overhead.
  # ════════════════════════════════════════════════════════════
  e2e-23-multi-tab-sync:
    name: E2E-23 · Multi-Tab State Synchronization
    needs: [build-extension, verify-built-manifest-csp]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download built Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-dist
          path: dist/

      - name: Install Playwright browsers (explicit, pre-test)
        run: npx playwright install --with-deps chromium

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run E2E-23 multi-tab sync spec (auto-retry on timeout)
        env:
          CI: 'true'
        # --retries=2 → up to 3 attempts total (1 initial + 2 retries).
        # Playwright's per-test retry treats timeout failures as retryable,
        # so a transient Monaco/onboarding stall on the first run won't
        # red-line the job. This is a test-flakiness mitigation only; it
        # does NOT affect runtime app behavior (no-retry-policy unaffected).
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            pnpm exec playwright test tests/e2e/e2e-23-multi-tab-sync.spec.ts \
              --project=chrome-extension \
              --retries=2 \
              --reporter=list

      - name: Run E2E-24 Cross-Project Sync Chrome spec
        env:
          CI: 'true'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            pnpm exec playwright test tests/e2e/e2e-24-cross-project-sync.spec.ts \
              --project=chrome-extension \
              --reporter=list


      - name: Upload Playwright artifacts (E2E-23)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-e2e-23
          path: test-results/artifacts
          retention-days: 7



  # ════════════════════════════════════════════════════════════
  # Registry-required build stubs.
  #
  # These jobs satisfy the strict standalone registry checker
  # (`scripts/report-standalone-registry.mjs --strict`) which requires a
  # `build-<scriptName>:` job for every project under standalone-scripts/.
  # They run the dedicated `pnpm run build:<name>` script and upload the
  # resulting dist as a `<name>-dist` artifact for downstream consumers.
  # ════════════════════════════════════════════════════════════

  build-marco-sdk:
    name: Build · marco-sdk
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v4
        with: { version: 9, run_install: false }
      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile
      - name: Cache standalone build · marco-sdk
        uses: actions/cache@v4
        with:
          path: |
            .cache/standalone-builds/marco-sdk
            .cache/tsbuildinfo/marco-sdk.tsbuildinfo
          key: ${{ runner.os }}-stdbuild-marco-sdk-${{ hashFiles('standalone-scripts/marco-sdk/src/**', 'standalone-scripts/marco-sdk/instruction.ts', 'standalone-scripts/marco-sdk/package.json', 'tsconfig.marco-sdk.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.marco-sdk.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stdbuild-marco-sdk-

      - name: Build marco-sdk
        run: pnpm run build:marco-sdk
      - uses: actions/upload-artifact@v4
        with:
          name: marco-sdk-dist
          path: standalone-scripts/marco-sdk/dist/
          retention-days: 1

