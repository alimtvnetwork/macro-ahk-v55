          key: ${{ runner.os }}-stdbuild-lovable-user-add-${{ hashFiles('standalone-scripts/lovable-user-add/src/**', 'standalone-scripts/lovable-user-add/instruction.ts', 'standalone-scripts/lovable-user-add/package.json', 'tsconfig.lovable-user-add.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.lovable-user-add.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
