          key: ${{ runner.os }}-stdbuild-lovable-common-${{ hashFiles('standalone-scripts/lovable-common/src/**', 'standalone-scripts/lovable-common/instruction.ts', 'standalone-scripts/lovable-common/package.json', 'tsconfig.lovable-common.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.lovable-common.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
