          key: ${{ runner.os }}-stdbuild-lovable-owner-switch-${{ hashFiles('standalone-scripts/lovable-owner-switch/src/**', 'standalone-scripts/lovable-owner-switch/instruction.ts', 'standalone-scripts/lovable-owner-switch/package.json', 'tsconfig.lovable-owner-switch.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.lovable-owner-switch.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stdbuild-lovable-owner-switch-

      - name: Build lovable-owner-switch
        run: pnpm run build:lovable-owner-switch
      - uses: actions/upload-artifact@v4
        with:
