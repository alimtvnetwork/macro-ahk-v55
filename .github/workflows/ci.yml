# ──────────────────────────────────────────────────────────────
# Marco Extension — CI Pipeline (main branch)
#
# Pipeline structure:
#   1. setup        — checkout, install, lint, test
#   2. build-sdk    — build Marco SDK (dependency for others)
#   3. build-standalone (parallel) — XPath, Macro Controller, Prompts
#   4. build-extension — final Chrome extension build
#
# Performance: Every job caches the pnpm content-addressable store
# AND node_modules keyed on pnpm-lock.yaml, so cached runs install
# in ~10 seconds instead of ~2 minutes. fetch-depth: 1 keeps clones small.
#
# NOTE: No email or notification integrations — by design.
# ──────────────────────────────────────────────────────────────

name: CI Build

on:
  push:
  pull_request:
    branches:
      - main

# CI revision marker: 2026-05-17 — force fresh run after Phase 2c
# compat-snapshot removal; old runs reference stale SHA with the
# retired "instruction.compat.json" requirement.
concurrency:
  # Group by ref (branch or PR head) so a fresh push to the same
  # branch/PR cancels any in-progress run instead of letting two
  # commits race to completion. Falls back to SHA for non-branch
  # events (tags, manual dispatch) so unrelated runs don't collide.
  group: ci-${{ github.workflow }}-${{ github.ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 0: Spec Links — fail-fast guard, no install needed
  #
  # Runs the strict spec-link checker (no baseline, ignores rot)
  # against every .md file under spec/. Surfaces a Top-N failing-files
  # leaderboard in the GitHub Actions Step Summary and emits inline
  # `::error file=…,line=…::` annotations so each broken link shows
  # up on the PR diff view.
  #
  # This job has NO dependencies — it only needs Node + the repo, so
  # it returns in seconds and blocks the rest of the pipeline before
  # we burn time on installs/builds. The final `build-extension` job
  # also lists this job in its `needs:` so a broken link cannot be
  # merged even if other checks pass.
  # ════════════════════════════════════════════════════════════
  spec-links:
    name: Preflight · Spec Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Strict spec-link check (fails on ANY broken link)
        run: node scripts/report-spec-links-ci.mjs

  markdown-filename-policy:
    name: Preflight · Markdown Filename Policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce markdown filename policy
        run: node scripts/check-markdown-filenames.mjs

      - name: Self-test markdown filename policy checker
        run: node --test scripts/__tests__/check-markdown-filenames.test.mjs

      - name: Enforce error-code registry integrity (Plan 26 / Step 15)
        run: node scripts/check-error-codes-unique.mjs

      - name: Self-test error-code registry checker
        run: node --test scripts/__tests__/check-error-codes-unique.test.mjs

      - name: Enforce no bare throws in macro-controller (Plan 27 regression gate)
        run: node scripts/check-bare-throw.mjs

      - name: Self-test bare-throw checker
        run: node --test scripts/__tests__/check-bare-throw.test.mjs

  # ════════════════════════════════════════════════════════════
  # Job 0a-bis: Blind-AI Audit Guards (Batch B–D output)
  #
  # Bundled preflight that fails fast if any of the 6 audit guards
  # produced during the 50-step blind-AI remediation regress:
  #   - coding-guidelines coverage  (Batch B)
  #   - logger compliance           (Batch C, advisory)
  #   - timer/observer teardown     (Batch D, advisory)
  #   - swallow-baseline monotonic  (Batch D)
  #   - spec README structure       (Batch D)
  #   - forbidden anim libs         (Batch D)
  # No install required; pure Node + fs.
  # ════════════════════════════════════════════════════════════
  blind-ai-audit-guards:
    name: Preflight · Blind-AI Audit Guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Coding-guidelines coverage gate
        run: node scripts/check-coding-guidelines-coverage.mjs
      - name: Swallow-baseline monotonic gate
        run: node scripts/check-swallow-baseline-monotonic.mjs
      - name: Spec README structure gate
        run: node scripts/check-spec-readme-structure.mjs --strict
      - name: Forbidden timezone tokens gate
        run: node scripts/check-forbidden-timezones.mjs
      - name: Forbidden animation libraries gate
        run: node scripts/check-forbidden-anim-libs.mjs
      - name: Timer/observer teardown audit (advisory)
        run: node scripts/audit-timer-teardown.mjs



  # ════════════════════════════════════════════════════════════
  # Job 0a0b: Nested-template-literal scanner — fast-fail guard
  #
  # Targets `standalone-scripts/lovable-common/src/report/run-summary-types.ts`
  # (and any future entries in TARGETS[] inside the scanner). Hard-pins
  # the no-nested-template-literals rule for that file even if someone
  # relaxes the project-wide ESLint sonarjs/* config later.
  #
  # No install, no node_modules — pure Node + fs. Returns in <100ms.
  # Listed in `build-extension.needs:` so a violation blocks merge.
  # ════════════════════════════════════════════════════════════
  no-nested-template-literals:
    name: Preflight · No Nested Template Literals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan for nested template literals
        run: node scripts/check-no-nested-template-literals.mjs

      - name: Scan .d.ts files for `unknown` regressions
        run: node scripts/check-no-unknown-in-dts.mjs

      - name: Self-test the .d.ts unknown scanner
        run: node --test scripts/__tests__/check-no-unknown-in-dts.test.mjs

      - name: Guard prompt-loader mocks use buildPromptLoaderMock()
        run: node scripts/check-prompt-loader-mocks.mjs

      - name: Guard against vi.func (Vitest mock factory is vi.fn)
        run: node scripts/check-vi-func.mjs

      - name: Enforce canonical logger imports (./logger barrel only)
        run: node scripts/check-canonical-logger-imports.mjs

      - name: Forbid em/en dashes in Vitest test files
        run: node scripts/check-em-dash-in-tests.mjs

      - name: Forbid em/en dashes in emitted failure reports
        run: node scripts/check-em-dash-in-failure-reports.mjs

      - name: Self-test the failure-report em-dash scanner
        run: node --test scripts/__tests__/check-em-dash-in-failure-reports.test.mjs




  # ════════════════════════════════════════════════════════════
  # Job 0a0c: ESLint pin on run-summary-types.ts
  #
  # Belt-and-braces companion to `no-nested-template-literals` above.
  # The custom scanner is fast (no install, <100ms) but only models
  # backtick nesting. This job runs the *real* ESLint (eslint.config.js
  # with `sonarjs/no-nested-template-literals: error`) against the one
  # file we have promised will never regress, with `--max-warnings=0`
  # so even the legacy-file `warn` override (if someone ever adds this
  # path to it) cannot mask a regression here.
  #
  # If the rule is ever relaxed project-wide, or the file is moved into
  # a `warn` override block by mistake, this job goes red — the scanner
  # alone would still pass, so this second gate is the one that catches
  # config drift specifically.
  # ════════════════════════════════════════════════════════════
  eslint-run-summary-types:
    name: Preflight · ESLint · run-summary-types.ts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-ext-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-ext-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: ESLint pinned file (zero warnings, sonarjs nested-template error)
        run: pnpm run lint:run-summary-types

      - name: Self-test ESLint rule pins
        run: pnpm run test:eslint-rules

  # ════════════════════════════════════════════════════════════
  # Job 0a1: Contract-checker wiring lint — pre-merge guard
  #
  # Discovers every `scripts/check-*-contract*.mjs` validator and fails
  # if any of them is NOT invoked from at least one workflow under
  # `.github/workflows/**` (directly via `node scripts/<name>.mjs`, or
  # indirectly via `npm run <script>` whose package.json command runs
  # the checker).
  #
  # Why a separate fast-fail job: a contract checker that is committed
  # but never wired into CI provides zero protection against drift —
  # this is exactly what hid `payment-banner-hider` from CI for several
  # PRs, and what `check-installer-contract.mjs` was almost shipped
  # without (until manually wired into installer-tests.yml). Catching
  # this at PR time, before any install or build burns minutes, makes
  # "you forgot to wire it" a one-line red signal.
  #
  # Pure Node + repo files. No deps, returns in <1s. Listed in
  # build-extension's `needs:` (below) so an orphaned checker blocks
  # merge even if other jobs pass.
  # ════════════════════════════════════════════════════════════
  contract-checkers-wired:
    name: Preflight · Contract-Checker Wiring
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assert every scripts/check-*-contract*.mjs is invoked from a workflow
        run: node scripts/check-contract-checkers-wired.mjs

  # ════════════════════════════════════════════════════════════
  # Job 0a2b: CI/CD index ↔ cicd-issues drift guard
  #
  # Cross-checks `.lovable/cicd-index.md` against the per-issue files
  # in `.lovable/cicd-issues/*.md` and fails CI on any of:
  #   - issue file on disk not listed in the index
  #   - index row pointing to a missing file
  #   - index column says Active but file's `## Status` is Resolved
  #     (or vice-versa) — the exact desync that hid issue #01 for
  #     two days after it was fixed.
  #
  # Pure Node + repo files. No install needed, returns in <1s.
  # Listed in build-extension's `needs:` (below) so a documentation
  # drift cannot reach main even if downstream builds re-pass.
  # ════════════════════════════════════════════════════════════
  cicd-index-sync:
    name: Preflight · CI/CD Index Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assert .lovable/cicd-index.md matches cicd-issues/*.md statuses
        run: node scripts/check-cicd-index-sync.mjs

  # ════════════════════════════════════════════════════════════
  # Job 0a2c: Changelog entry guard — version-bump pre-merge check
  #
  # Asserts that `changelog.md` contains a heading entry for the
  # current `EXTENSION_VERSION` declared in `src/shared/constants.ts`.
  # Catches the recurring footgun where a version bump (manifest +
  # constants + standalone instructions) lands without an accompanying
  # changelog note, leaving users unable to discover what changed.
  #
  # Pure Node + repo files. No install needed, returns in <1s.
  # Listed in build-extension's `needs:` so a missing entry blocks
  # merge even if downstream builds re-pass.
  # ════════════════════════════════════════════════════════════
  # ════════════════════════════════════════════════════════════
  # Job 0a1b: macro-controller circular-dependency floor (Plan-17 step 7)
  #
  # Runs `scripts/check-madge-cycles.mjs --strict` against
  # `standalone-scripts/macro-controller/src` and fails the build if the
  # observed cycle count exceeds
  # `spec/33-missing-coding-guideline/99-baselines.json`
  # `baselines.macroControllerCycles` (currently 33, target 0).
  #
  # Uses `npx --yes madge` — no lockfile install needed. Sequential
  # fail-fast per `mem://constraints/no-retry-policy`. This job is the
  # ratchet: every subsequent Plan-17 step must lower the number or
  # leave it unchanged; regressions are blocked at PR time.
  # ════════════════════════════════════════════════════════════
  madge-cycles-floor:
    name: Preflight · Macro-Controller Cycles ≤ Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Assert observed cycles ≤ baseline
        run: node scripts/check-madge-cycles.mjs --strict

  # ════════════════════════════════════════════════════════════
  # Runs `scripts/check-strict-flag-fallout.mjs --strict` which enables
  # each deferred strict tsconfig flag one at a time and asserts the
  # `error TS` count stays at or below the recorded floor in
  # `spec/33-missing-coding-guideline/99-baselines.json`
  # (`baselines.strictFlagFallout`). Blocks any change that reintroduces
  # strict-flag fallout or regresses an already-enabled flag.
  #
  # Sequential fail-fast per `mem://constraints/no-retry-policy`.
  # ════════════════════════════════════════════════════════════
  strict-flag-fallout:
    name: Preflight · Strict Flag Fallout ≤ Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Assert strict-flag errors ≤ baseline
        run: node scripts/check-strict-flag-fallout.mjs --strict


  # P0 rules audit runs as an independent preflight gate.
  p0-rules-audit:
    name: Preflight · P0 Rules Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: P0 rules audit (strict, all 10 categories at-or-below baseline)
        run: node scripts/audit-p0-rules.mjs --strict







  # ════════════════════════════════════════════════════════════
  # Job 0a3: PascalCase instruction migration — fast-fail guard
  #
  # Phase 2 of the instruction-manifest migration split the canonical
  # `dist/instruction.json` (pure PascalCase) from a transitional
  # `dist/instruction.compat.json` (camelCase snapshot, allowed only
  # for the vite copyProjectScripts plugin). The migration only holds
  # if every runtime consumer reads PascalCase keys from the canonical
  # file. A single regression — a `instruction.displayName` slipping
  # through — silently returns `undefined`, then gets masked by
  # `?? defaults` and only surfaces weeks later as a missing script
  # or empty config injection.
  #
  # `scripts/check-pascalcase-instruction-migration.mjs` enforces three
  # things in one pass with no deps:
  #
  #   CHECK A — every standalone-scripts/<name>/src/instruction.ts
  #             contains only PascalCase object-literal keys.
  #   CHECK B — instruction.compat.json is read only from the
  #             documented allowlist (Phase 2c will empty it).
  #   CHECK C — every file that reads canonical instruction.json
  #             uses PascalCase property access on instruction-tree
  #             receivers (`instruction`, `instructionManifest`, …).
  #
  # Listed in build-extension's `needs:` (below) so a regression
  # cannot reach main even if downstream builds re-pass.
  # ════════════════════════════════════════════════════════════
  pascalcase-instruction-migration:
    name: Preflight · PascalCase Instruction Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assert PascalCase contract on instruction sources + readers
        run: node scripts/check-pascalcase-instruction-migration.mjs

      - name: Assert PascalCase v4 contract on bundle CREATE TABLE source
        run: node scripts/check-bundle-schema-contract.mjs

  # ════════════════════════════════════════════════════════════
  # Job 0a2: Standalone Registry Report — fast-fail orchestration guard
  #
  # Runs `scripts/report-standalone-registry.mjs --strict` so the very
  # first thing visible in the CI log is a checklist of every standalone
  # script and which orchestration source-of-truth files contain it
  # (package.json build scripts, build:extension chain, build-standalone,
  # check-standalone-dist, tsconfig.<name>.json, vite.config.<name>.ts,
  # CI build-<name> job).
  #
  # Strict mode means: if a new bundle is added but only wired into
  # 5 of the 7 required locations (the recurring failure that hid
  # `payment-banner-hider` from CI for several PRs), the missing rows
  # show up as `[X]` AND the job exits 1 with `::error file=…::`
  # annotations on the offending file — no need to chase a downstream
  # "artifact missing" error 8 minutes later.
  #
  # Also writes a markdown matrix to GITHUB_STEP_SUMMARY so the report
  # is one click away from the PR checks tab. Listed in build-extension's
  # `needs:` so a registry gap blocks merge.
  #
  # No install needed — pure Node + repo files. Returns in <1s.
  # ════════════════════════════════════════════════════════════
  report-standalone-registry:
    name: Preflight · Standalone Registry (strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preflight · actionable wiring report (prints exact files to create)
        env:
          CI: 'true'
        run: node scripts/preflight-standalone-wiring.mjs

      - name: Strict standalone-registry check (fails on ANY wiring gap)
        if: always()
        env:
          CI: 'true'
        run: node scripts/report-standalone-registry.mjs --strict

  # ════════════════════════════════════════════════════════════
  # Job 0a4: Root README conventions — fast-fail guard (path-aware)
  #
  # Asserts that `readme.md` complies with the structural rules in
  # `spec/01-spec-authoring-guide/11-root-readme-conventions.md`:
  # exactly one H1, centered hero <div> wrapping the logo + H1 +
  # tagline blockquote + badges, all 5 required badge group markers
  # (Build & Release / Repo activity / Community / Code-quality /
  # Stack & standards), ≥5 total badges, properly closed hero before
  # the first ## section, and a complete Author + Company + License
  # tail. Regressions here have shipped to main twice already (the
  # `<h1 align="center">` shortcut and a missing badge-group marker
  # both slipped through PR review), so we gate it in CI before any
  # install or build burns minutes.
  #
  # Path-aware execution (added 2026-04-25):
  #   The job ALWAYS RUNS so it can remain a required status check
  #   (GitHub branch protection treats a `paths:`-skipped job as
  #   "successful" — which would silently allow a README regression
  #   to merge whenever any non-README file also changed in the same
  #   PR; that defeats the gate entirely). Instead, the first step
  #   detects whether `readme.md` OR either compliance script changed
  #   in the PR/push diff and exports `changed=true|false`. The two
  #   compliance steps are gated on `changed == 'true'` so:
  #     • README touched ⇒ both checkers run, regressions block merge
  #     • README untouched ⇒ checkers skipped, job exits green in <2s
  #   The checker scripts themselves are part of the watched paths so
  #   any change to the rules also re-runs the gate against the
  #   current README — preventing a silent rule regression.
  #
  # Pure Node + repo files. No install needed. Listed in
  # build-extension's `needs:` (below) so a README regression blocks
  # merge even if downstream builds re-pass.
  # ════════════════════════════════════════════════════════════
  readme-conventions:
    name: Preflight · Root README Conventions
    runs-on: ubuntu-latest
    # dorny/paths-filter calls the GitHub Files API on `pull_request`
    # events. Explicitly grant `pull-requests: read` so the action
    # works on fork PRs even if the workflow-level `permissions:`
    # block is tightened in the future. `contents: read` is needed
    # for the `push`-event git-diff fallback.
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 → unshallow clone. Required for two reasons:
          #   (1) dorny/paths-filter on `push` events runs `git diff
          #       <base>..<head>` locally, which needs both commits in
          #       the local history. A shallow clone (the GitHub
          #       default of depth=1) silently makes that diff return
          #       empty/garbage when `base` is older than the shallow
          #       boundary — the exact "incorrectly skip checks"
          #       failure mode this job must avoid.
          #   (2) The `Resolve safe diff base` step below uses
          #       `git cat-file -e` to verify the push event's
          #       `before` SHA is reachable; that probe is meaningful
          #       only on a full-history clone.
          # fetch-depth: 0 is cheap on this repo (<2s) and is the
          # ONLY reliable way to make `git diff` semantically correct
          # across force-pushes, branch rewrites, and merge-base drift.
          fetch-depth: 0

      # ─── Resolve a safe `base` ref for the push-event diff ──────────
      # On `pull_request` events this step is a no-op — dorny uses
      # the GitHub Files API and ignores its `base:` input.
      # On `push` events we must hand dorny a base SHA that is
      # actually reachable in the local clone. Three failure modes
      # exist here, all of which would silently skip checks if not
      # handled:
      #   A) First push to a new branch → `event.before` is the all-
      #      zero SHA. `git diff 0000…0000 HEAD` returns empty (no
      #      ancestor) on some git versions and "everything" on
      #      others → unreliable.
      #   B) Force-push that rewrites history → `event.before` no
      #      longer exists in the remote, so even `fetch-depth: 0`
      #      can't resolve it. `git diff <missing>..HEAD` errors out
      #      and dorny would either fail the job red OR (worse, in
      #      older versions) silently produce empty output.
      #   C) Branch deletion event (`event.after` is zero) → not
      #      applicable for our trigger filter (branches: [main]),
      #      but defensive code costs nothing.
      #
      # Resolution policy: when `event.before` is unreachable for any
      # reason, fall back to an empty `base` — dorny then treats the
      # entire HEAD tree as changed, which RE-RUNS the README checks.
      # That is the correct fail-CLOSED-but-run-checks behavior:
      # we never silently skip, and a README regression still fails
      # the job red. The 2-second cost of an unnecessary check run
      # on a force-push is acceptable; a missed regression is not.
      - name: Resolve safe diff base for push events
        id: base
        if: github.event_name == 'push'
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          ZERO='0000000000000000000000000000000000000000'
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$ZERO" ]; then
            echo "First-push or branch-create event (before=$BEFORE)."
            echo "→ base='' → dorny will treat HEAD as fully changed → checks will run."
            echo "value=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "Reachable previous SHA: $BEFORE → using as diff base."
            echo "value=${BEFORE}" >> "$GITHUB_OUTPUT"
          else
            echo "Previous SHA $BEFORE not reachable in local history (force-push or rewritten branch)."
            echo "→ base='' → dorny will treat HEAD as fully changed → checks will run."
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      # ─── Path-aware change detection (dorny/paths-filter) ──────────
      # Why dorny over a hand-rolled `git diff`:
      #   • Correctly handles fork PRs — a hand-rolled bash diff has
      #     no access to the base repo's commits. Dorny uses the
      #     GitHub Files API on `pull_request` events, which returns
      #     the authoritative changed-files list regardless of
      #     fork/base relationship.
      #   • Pinned to a verified release SHA (v3.0.2) — the SHA pin
      #     prevents tag-replay supply-chain attacks while still
      #     letting Dependabot bump it on review.
      #
      # Output `steps.changes.outputs.readme` is `'true'` iff any of
      # the watched paths changed in the PR/push diff. The base SHA
      # used for `push` events is the one resolved above — guaranteed
      # to be either a reachable commit OR empty (which makes dorny
      # treat HEAD as fully changed and run the checks). There is NO
      # code path where `readme` can be `'false'` due to a degraded
      # detect step — we either get a real diff or we run the checks.
      - name: Detect README / checker script changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          base: ${{ github.event_name == 'push' && steps.base.outputs.value || '' }}
          # Filters: any of these paths flips `readme=true`. Keeping
          # both checker scripts in the watch list ensures a rule
          # change re-validates the current README on the same PR.
          filters: |
            readme:
              - 'readme.md'
              - 'scripts/check-readme-compliance.mjs'
              - 'scripts/check-readme-hero-layout.mjs'

      - name: Setup Node.js
        if: steps.changes.outputs.readme == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assert readme.md complies with root-readme conventions
        if: steps.changes.outputs.readme == 'true'
        run: node scripts/check-readme-compliance.mjs

      - name: Assert hero/badge/logo markup stays inside the allowed regions
        if: steps.changes.outputs.readme == 'true'
        run: node scripts/check-readme-hero-layout.mjs

      - name: No-op summary (readme + checker scripts unchanged)
        if: steps.changes.outputs.readme != 'true'
        run: echo "::notice::readme.md and checker scripts unchanged in this PR/push; conventions check skipped (gate stays required and green)."

  #
  # Runs `tsc --noEmit` against every standalone-script tsconfig
  # in a single job. Catches TS2304/TS2345/etc errors in seconds
  # — long before the heavier build-* jobs would surface them
  # via `pnpm build:macro-controller` (which also runs LESS,
  # templates, prompts, and vite — masking the type error noise
  # behind 60+ seconds of unrelated work).
  #
  # Caches both pnpm store and node_modules so cached runs install
  # in ~10s. Lists this job in build-extension's `needs:` so a
  # type error blocks merges even if downstream builds are re-run.
  #
  # Why one job, not four: each tsc invocation is ~3–8s. Spinning
  # up four runners would burn more time on container startup +
  # install than the actual checks. Keep them serial in one job.
  # ════════════════════════════════════════════════════════════
  typecheck-standalone:
    name: Preflight · Typecheck (Standalone Scripts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-typecheck-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-typecheck-

      # ── TypeScript incremental cache ────────────────────────────
      # tsc writes a `.tsbuildinfo` file per project when invoked
      # with `--incremental`. On the next run it skips re-checking
      # files whose inputs haven't changed → 3–5× faster on cache
      # hits. Cache is keyed on the union of every standalone
      # tsconfig + the source trees they cover, so any source or
      # config edit invalidates only when it actually matters.
      # `restore-keys` lets us fall back to the most recent build
      # info even on a partial miss (e.g. one file changed).
      - name: Cache TypeScript incremental build info
        uses: actions/cache@v4
        with:
          path: .cache/tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.payment-banner-hider.json', 'tsconfig.macro.build.json', 'standalone-scripts/**/*.ts', 'standalone-scripts/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-

      - name: Ensure tsbuildinfo cache dir exists
        run: mkdir -p .cache/tsbuildinfo

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      # Compile standalone-script tsconfigs with --noEmit. Small
      # projects use incremental build info, but Macro Controller runs
      # a cold no-emit check so restored cache state cannot surface
      # stale TS6133 diagnostics for already-removed symbols.
      # Any TS2304 (missing global), TS2345 (bad arg type), etc.
      # still fails the job with inline annotations on the offending
      # line.
      - name: Typecheck · Marco SDK
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/sdk.tsbuildinfo -p tsconfig.sdk.json

      - name: Typecheck · XPath
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/xpath.tsbuildinfo -p tsconfig.xpath.json

      - name: Typecheck · Payment Banner Hider
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/payment-banner-hider.tsbuildinfo -p tsconfig.payment-banner-hider.json

      # Fails the build on ANY TypeScript error in
      # standalone-scripts/macro-controller/src (TS2304 missing globals,
      # TS2345 bad arg types, TS2339 missing properties, etc.). This
      # step is required by build-extension via `needs:`, so a red
      # typecheck here blocks the release pipeline end-to-end.
      - name: Typecheck · Macro Controller
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/macro-controller.tsbuildinfo -p tsconfig.macro.build.json

      # Guarantees every tsconfig that consumes RiseupAsia ambient
      # globals actually resolves the canonical declaration files
      # (standalone-scripts/types/riseup-namespace.d.ts and the
      # per-package globals.d.ts). Regressions to `include`, `types`,
      # or triple-slash references would silently drop the declarations
      # and let TS2304 slip past typecheck; this guard blocks that.
      - name: Guard · Ambient globals coverage
        run: node scripts/check-ambient-globals-coverage.mjs

  # ════════════════════════════════════════════════════════════
  # Job 0b2: Typecheck App (main React app + node tooling)
  #
  # Runs `tsc --noEmit` against every project referenced by the root
  # solution-style `tsconfig.json` (currently `tsconfig.app.json` and
  # `tsconfig.node.json`). The existing `typecheck-standalone` job
  # only covers `standalone-scripts/**` — the main `src/**` tree was
  # NEVER typechecked in CI, which is exactly how
  # `ParseDeliveryBaseResult`-style mismatches reached main without
  # tripping a gate.
  #
  # Always runs (no `paths:` filter) — the user's directive was
  # explicit: "ALWAYS runs TypeScript typecheck and fails the build
  # immediately on any type errors". This job listed in
  # build-extension's `needs:` so a type error blocks the merge even
  # if downstream builds happen to be re-run from cache.
  #
  # Sequential, fail-fast (Core no-retry policy). First project with
  # errors aborts the job. Inline `::error::` annotations point at
  # the offending file:line so PR diff surfaces the issue.
  #
  # Cache strategy mirrors typecheck-standalone: shared `.cache/
  # tsbuildinfo/` directory keyed on the union of every covered
  # tsconfig + the source trees they cover. Cached cold runs land
  # in ~10s.
  # ════════════════════════════════════════════════════════════
  typecheck-app:
    name: Preflight · Typecheck (App)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-nm-typecheck-app-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-typecheck-app-

      - name: Cache TypeScript incremental build info (app)
        uses: actions/cache@v4
        with:
          path: .cache/tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-app-${{ hashFiles('tsconfig.json', 'tsconfig.app.json', 'tsconfig.node.json', 'src/**/*.ts', 'src/**/*.tsx', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-app-

      - name: Ensure tsbuildinfo cache dir exists
        run: mkdir -p .cache/tsbuildinfo

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Strict TypeScript gate (app + node)
        run: pnpm run typecheck

  # ════════════════════════════════════════════════════════════
  # Job 0b3: Clean Typecheck (no incremental cache)
  #
  # Runs `npx tsc --noEmit` from a cold state against every tsconfig
  # covered by `typecheck-standalone` and `typecheck-app`, with NO
  # `--incremental` flag and NO restored `.tsbuildinfo` cache.
  #
  # Why this exists: module-resolution errors like TS2307 (a real
  # regression that hit `repair-plan-next-orphans.ts` in Nov 2026)
  # can be masked by a stale `.tsbuildinfo` file that still records
  # the old module graph. The incremental jobs above stay for speed;
  # this cold job is the ground-truth gate that catches any drift
  # they might miss. Runs on every push and PR (no `paths:` filter)
  # per the "never let TS2307 slip through" directive.
  #
  # Sequential, fail-fast. Any TS error inline-annotates the file.
  # ════════════════════════════════════════════════════════════
  typecheck-clean:
    name: Preflight · Typecheck (Clean, No Cache)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      # Cold, non-incremental tsc runs. No --incremental, no
      # --tsBuildInfoFile, no cache restore: stale module graphs
      # cannot mask TS2307 or similar resolution errors.
      - name: Clean typecheck · Marco SDK
        run: npx tsc --noEmit -p tsconfig.sdk.json

      - name: Clean typecheck · XPath
        run: npx tsc --noEmit -p tsconfig.xpath.json

      - name: Clean typecheck · Payment Banner Hider
        run: npx tsc --noEmit -p tsconfig.payment-banner-hider.json

      - name: Clean typecheck · Macro Controller
        run: npx tsc --noEmit -p tsconfig.macro.build.json

      - name: Clean typecheck · App
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Clean typecheck · Node tooling
        run: npx tsc --noEmit -p tsconfig.node.json



  # ════════════════════════════════════════════════════════════
  # Job 0c: ESLint Standalone Scripts — fast-fail lint guard
  #
  # Runs ESLint scoped to standalone-scripts/ (macro-controller,
  # marco-sdk, xpath, payment-banner-hider) with --max-warnings=0
  # so any new warning fails the build. Surfaces violations as
  # inline `::error file=…,line=…,col=…::` GitHub annotations on
  # the PR diff.
  #
  # Why a separate job (vs `setup`'s existing `pnpm run lint`):
  #   - Runs in parallel with setup + typecheck — no waiting for
  #     tests or installs of build deps to surface lint failures.
  #   - Scoped to standalone-scripts/ only — quick (~5–8s after
  #     install) and isolates the noise from React/UI lint output.
  #   - --max-warnings=0 enforces zero-warnings policy
  #     (mem://architecture/linting-policy).
  #
  # Listed in build-extension's needs: so a lint regression
  # blocks merge even if other jobs pass.
  # ════════════════════════════════════════════════════════════
  lint-standalone:
    name: Preflight · ESLint (Standalone Scripts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 → full history so `git log`/`git rev-parse`
          # in the diagnostics step have real data, and so any
          # blame/baseline lint checks see the full ancestry.
          fetch-depth: 0
          # clean: true → wipes any pre-existing workspace files
          # (defense against self-hosted/cached-runner residue) so
          # ESLint always lints exactly what's at HEAD.
          clean: true
          # Always check out the ref the workflow was triggered for,
          # not a merge commit GitHub may have synthesised.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-lint-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-lint-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      # Diagnostics: print exact commit SHA, Node/pnpm/ESLint versions, and the
      # lint command line. Makes mismatches between local and CI obvious when
      # warnings appear to disagree across runs.
      - name: Lint diagnostics (commit, versions, command)
        run: |
          echo "::group::Lint environment diagnostics"
          echo "Git commit SHA   : ${{ github.sha }}"
          echo "Git ref          : ${{ github.ref }}"
          echo "Short SHA        : $(git rev-parse --short HEAD)"
          echo "HEAD commit      : $(git log -1 --oneline)"
          echo "Node version     : $(node --version)"
          echo "pnpm version     : $(pnpm --version)"
          echo "npx version      : $(npx --version)"
          echo "ESLint version   : $(npx eslint --version)"
          echo "ESLint config    : $(ls eslint.config.* 2>/dev/null || echo '(none at root)')"
          echo "Lint command     : npx eslint standalone-scripts --max-warnings=0 --format=stylish"
          echo "::endgroup::"

      # Stylish format → human-readable in the Actions log.
      # Compact format → piped to a one-liner that emits GitHub
      # annotations so each violation shows up on the PR diff.
      - name: ESLint · Standalone Scripts (errors + warnings)
        run: npx eslint standalone-scripts --max-warnings=0 --format=stylish

      - name: ESLint · Macro Controller domain-specific guards
        run: pnpm run lint:macro

  # ════════════════════════════════════════════════════════════
  # Job 1: Setup, Lint, Test
  # ════════════════════════════════════════════════════════════
  setup:
    name: Setup · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enforce lowercase .md filenames
        run: |
          # Allow either all-lowercase hyphen-case (foo-bar.md) OR
          # conventional ALL-CAPS docs (README.md, OWNERS.md, GLOSSARY.md,
          # ACCEPTANCE-MATRIX.md, BLIND-AI-SMOKE-TEST.md, etc.).
          # Reject mixed-case (e.g. MyDoc.md, fooBar.md).
          VIOLATIONS=$(find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './skipped/*' \
            | while read -r f; do
                base=$(basename "$f" .md)
                if echo "$base" | grep -qE '^[a-z0-9][a-z0-9-]*$'; then continue; fi
                if echo "$base" | grep -qE '^[A-Z0-9][A-Z0-9_-]*$'; then continue; fi
                echo "$f"
              done)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Mixed-case .md filenames found — use lowercase hyphen-case or ALL-CAPS:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ All .md filenames follow naming convention"

      - name: Enforce no committed *.zip / *.crx / *.xpi (spec/2026-spec/02 §26)
        run: node scripts/check-no-committed-zips.mjs

      - name: Preflight · Chrome E2E verification coverage gate
        run: node scripts/check-e2e-chrome-verification.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preflight · forbid broken pnpm-dlx-less invocation
        run: node scripts/check-no-pnpm-dlx-less.mjs

      - name: Preflight · standalone build portability
        run: node scripts/check-standalone-build-portability.mjs

      - name: Preflight · standalone build ASCII output
        run: node scripts/check-script-ascii-output.mjs

      - name: Preflight · pnpm non-interactive .npmrc keys
        run: node scripts/check-npmrc-pnpm-noninteractive.mjs

      - name: Preflight · no nested pnpm run in build scripts
        run: node scripts/check-no-nested-pnpm-run.mjs

      - name: Preflight · pnpm built dependencies approved
        run: node scripts/check-pnpm-built-dependencies.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-setup-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-setup-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Run root lint
        run: pnpm run lint

      # Legacy loud runner. Kept for on-demand debugging; disabled in CI
      # so logs stay clean. Flip `if:` to true (or run locally with
      # `pnpm run test`) to restore verbose output.
      - name: Run tests (verbose, legacy)
        if: ${{ false }}
        run: pnpm run test

      - name: Run tests (parallel, quiet — failures/warnings only)
        run: pnpm run test:quiet

  # ════════════════════════════════════════════════════════════
  # Job 2: Build SDK (dependency for other standalone scripts)
  # ════════════════════════════════════════════════════════════
  build-sdk:
    name: Build · Marco SDK
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-sdk-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-sdk-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Cache standalone build · marco-sdk
        uses: actions/cache@v4
        with:
          path: |
            .cache/standalone-builds/marco-sdk
            .cache/tsbuildinfo/marco-sdk.tsbuildinfo
          key: ${{ runner.os }}-stdbuild-marco-sdk-${{ hashFiles('standalone-scripts/marco-sdk/src/**', 'standalone-scripts/marco-sdk/instruction.ts', 'standalone-scripts/marco-sdk/package.json', 'tsconfig.marco-sdk.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.marco-sdk.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stdbuild-marco-sdk-

      - name: Build Marco SDK
        run: pnpm run build:sdk

      - name: Upload SDK dist
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3a: Build XPath (parallel with 3b, 3c)
  # ════════════════════════════════════════════════════════════
  build-xpath:
    name: Build · XPath
    needs: build-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-xpath-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-xpath-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Cache standalone build · xpath
        uses: actions/cache@v4
        with:
          path: |
            .cache/standalone-builds/xpath
            .cache/tsbuildinfo/xpath.tsbuildinfo
          key: ${{ runner.os }}-stdbuild-xpath-${{ hashFiles('standalone-scripts/xpath/src/**', 'standalone-scripts/xpath/instruction.ts', 'standalone-scripts/xpath/package.json', 'tsconfig.xpath.json', 'tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.macro.build.json', 'tsconfig.payment-banner-hider.json', 'vite.config.xpath.ts', 'vite.config.sdk.ts', 'vite.config.xpath.ts', 'vite.config.macro.ts', 'vite.config.payment-banner-hider.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stdbuild-xpath-

      - name: Build XPath
