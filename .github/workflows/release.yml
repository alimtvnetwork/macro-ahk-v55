            echo "| \`clone-repo.ps1\` | Shallow source checkout helper with ZIP fallback |"
            echo "| \`install.ps1\` | Unified PowerShell installer (URL-pinned to this release when fetched here) |"
            echo "| \`install.sh\` | Unified Bash installer (URL-pinned to this release when fetched here) |"
            echo "| \`VERSION.txt\` | Version identifier |"
            echo "| \`checksums.txt\` | SHA256 checksums |"
            echo "| \`checksums.txt.minisig\` | Minisign signature for checksums.txt (when published) |"
          } > release-assets/RELEASE_NOTES.md

          NOTES="release-assets/RELEASE_NOTES.md"
          QUICK_LINE=$(grep -n '^### Quick Install$' "$NOTES" | cut -d: -f1 | head -1 || true)
          CHANGED_LINE=$(grep -n "^### What's Changed$" "$NOTES" | cut -d: -f1 | head -1 || true)
          if [[ -z "$QUICK_LINE" || -z "$CHANGED_LINE" || "$QUICK_LINE" -ge "$CHANGED_LINE" ]]; then
            echo "::error::Quick Install must appear before What's Changed in RELEASE_NOTES.md"
            exit 1
          fi
          for required in \
            "download-extension.ps1" \
            "releases/download/${VER}/install.ps1" \
            "releases/download/${VER}/install.sh" \
            "Manual Install (Chromium)"; do
            if ! grep -Fq "$required" "$NOTES"; then
              echo "::error::RELEASE_NOTES.md missing required install content: $required"
              exit 1
            fi
          done

          cat release-assets/RELEASE_NOTES.md

      # ── Generate minisign signature (conditional on secret availability) ──
      - name: Sign checksums with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "No MINISIGN_SECRET_KEY secret available — skipping signature generation."
            echo "::notice::To enable minisign signing: add MINISIGN_SECRET_KEY to repository secrets."
            exit 0
          fi
          if ! command -v minisign >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          fi
          mkdir -p /tmp/minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/minisign/minisign.key
          minisign -S -m release-assets/checksums.txt -s /tmp/minisign/minisign.key -x release-assets/checksums.txt.minisig
          shred -u /tmp/minisign/minisign.key
          rmdir /tmp/minisign 2>/dev/null || true
          echo "✅ Signed checksums.txt → checksums.txt.minisig"

      # ── Attest build provenance (SLSA) ─────────────────────
      - name: Attest release assets
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            release-assets/checksums.txt
            release-assets/*.zip

      # ── Create GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.publish_tag }}
          name: "Marco Extension ${{ needs.setup.outputs.publish_tag }}"
          body_path: release-assets/RELEASE_NOTES.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(needs.setup.outputs.publish_tag, '-') }}
          make_latest: ${{ !contains(needs.setup.outputs.publish_tag, '-') }}

      # ── Force release body to the rich RELEASE_NOTES.md ──
      # The create-release-page early job creates the release with a
      # terse placeholder body so the page exists even if the build
      # fails. softprops/action-gh-release above SHOULD overwrite it
      # via body_path, but empirically it does not always replace an
      # existing body — leaving the placeholder visible on the page.
      # `gh release edit --notes-file` guarantees the rich body wins.
      - name: Force rich release notes onto the release page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.setup.outputs.publish_tag }}
        run: |
          set -euo pipefail
          if [[ ! -s release-assets/RELEASE_NOTES.md ]]; then
            echo "::error::release-assets/RELEASE_NOTES.md missing or empty - cannot set rich body"
            exit 1
          fi
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --notes-file release-assets/RELEASE_NOTES.md \
            --title "Marco Extension $TAG"
          echo "Forced rich body onto release $TAG"


