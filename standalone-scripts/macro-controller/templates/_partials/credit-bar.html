<!-- Credit Bar Partial -->
<!-- Variables: label, value, percentage, gradientStart, gradientEnd -->
<div class="marco-credit-segment" style="width:{{percentage}}%">
  <div class="marco-credit-fill" style="background:linear-gradient(90deg, {{gradientStart}}, {{gradientEnd}})"></div>
  <span class="marco-credit-label">{{label}}: {{value}}</span>
</div>
