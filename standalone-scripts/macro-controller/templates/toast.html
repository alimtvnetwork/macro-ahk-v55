<!-- Toast Notification Template -->
<!-- Variables: message, level (success|warn|error|info), icon -->
<div class="marco-toast marco-toast-{{level}}" role="alert">
  <span class="marco-toast-icon">{{icon}}</span>
  <span class="marco-toast-message">{{message}}</span>
  <button class="marco-toast-close" data-action="dismiss">&times;</button>
</div>
